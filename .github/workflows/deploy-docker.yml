name: Docker Image Release

# Legacy OpenEthereum Docker pipeline — targets openethereum/openethereum on
# Docker Hub which is not maintained by VirBiCoin. Disabled to avoid CI noise.
# Use release.yml for publishing ovbc binaries.
on:
  workflow_dispatch:

jobs:
  deploy-docker:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --bin ovbc
